services:

  kafka:
    image: bitnami/kafka:3.7
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  training-pytorch-fashion:
    build: ./backend/training-service
    environment:
      - LIBRARY=pytorch
      - DATASET=fashion-mnist
      - KAFKA_BROKER=kafka:9092
    volumes:
      - datasets:/app/data
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G

  training-keras-fashion:
    build: ./backend/training-service
    environment:
      - LIBRARY=keras
      - DATASET=fashion-mnist
      - KAFKA_BROKER=kafka:9092
    volumes:
      - datasets:/app/data
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G

  training-pytorch-cifar:
    build: ./backend/training-service
    environment:
      - LIBRARY=pytorch
      - DATASET=cifar100
      - KAFKA_BROKER=kafka:9092
    volumes:
      - datasets:/app/data
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G

  training-keras-cifar:
    build: ./backend/training-service
    environment:
      - LIBRARY=keras
      - DATASET=cifar100
      - KAFKA_BROKER=kafka:9092
    volumes:
      - datasets:/app/data
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G

volumes:
  datasets:
